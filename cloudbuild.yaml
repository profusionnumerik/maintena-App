steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/maintena:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maintena:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/maintena:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/maintena:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - maintena
      - '--image=gcr.io/$PROJECT_ID/maintena:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/maintena:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/maintena:latest'
